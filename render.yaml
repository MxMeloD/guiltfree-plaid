# Deploy to Render (free). New ▸ Blueprint ▸ this repo. Provisions the web service AND a durable
# Key Value (Redis) store, and auto-wires REDIS_URL between them — no manual env copying.
services:
  - type: web
    name: guiltfree-plaid
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PLAID_ENV
        value: production
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_REDIRECT_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: guiltfree-kv
          type: keyvalue
          property: connectionString

  - type: keyvalue
    name: guiltfree-kv
    plan: free
    maxmemoryPolicy: noeviction   # never evict our saved bank tokens
    ipAllowList: []               # internal connections only
